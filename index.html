<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Kerala Lottery Online Counter</title>
    <style>
        :root {
            --primary-color: #008744;
            --secondary-color: #005a2b;
            --light-green: #e6fffa;
            --border-green: #2ecc71;
            --background-light: #f7f9fc;
            --text-dark: #2d3748;
            --card-border: #e2e8f0;
            --live-red: #e53e3e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Top Banner Container - Exact Image Bound */
        .hero-banner {
            width: 100%;
            height: 190px;
            background: url('1000016014.png') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: flex-end;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.3));
        }

        /* Live Today Draw Ticker Layout - White Background Removed & Semi-Transparent Glass Effect Added */
        .live-ticker {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            background: rgba(255, 255, 255, 0.85); /* Semi-transparent white to reveal background image clearly */
            border-left: 5px solid var(--live-red);
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 2;
            backdrop-filter: blur(4px); /* Professional look */
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .live-label-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Tik-Tik Logo Badge */
        .live-badge {
            background: var(--live-red);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Continuous Blinking Animation Effect */
        .ticker-dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            animation: tiktik 0.6s infinite alternate;
        }

        .draw-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #1a202c; /* Clear text color over background */
        }

        .ticker-text {
            font-size: 0.9rem;
            color: #1a202c;
            font-weight: 700;
            background: rgba(255, 245, 245, 0.9);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #fed7d7;
        }

        /* Status Bar Layout */
        .status-bar {
            background: #ffffff;
            padding: 14px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Premium Green Text Styling for Kerala State Lottery */
        .status-left-green { 
            color: var(--primary-color); 
            display: flex; 
            align-items: center; 
            gap: 5px;
            font-weight: 800;
        }

        .status-right-green { 
            color: var(--primary-color); 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            font-weight: 700;
        }

        /* Form Details */
        .form-body { padding: 20px; }
        .form-group { margin-bottom: 18px; }
        
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #718096;
            margin-bottom: 6px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        
        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 40px;
            border: 1.5px solid var(--card-border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background: var(--background-light);
        }

        .input-wrapper input:focus {
            border-color: var(--primary-color);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 135, 68, 0.1);
        }

        .input-wrapper .icon { position: absolute; left: 14px; color: #a0aec0; }

        /* Ticket Box Container with Green Dashed Border */
        .ticket-container {
            border: 2px dashed var(--border-green);
            background: #ffffff;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--card-border);
        }

        .ticket-title {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Ticket Grid Box */
        .ticket-grid {
            max-height: 260px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .ticket-grid::-webkit-scrollbar { width: 6px; }
        .ticket-grid::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .ticket-grid::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        .ticket-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 12px;
            background: var(--background-light);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .ticket-item:hover { background: #edf2f7; }
        
        /* Green selection highlight */
        .ticket-item.selected { 
            background: var(--light-green); 
            border-color: var(--primary-color); 
        }

        .ticket-number {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a202c;
            letter-spacing: 0.5px;
        }

        .ticket-checkbox { 
            width: 18px; 
            height: 18px; 
            accent-color: var(--primary-color); 
            cursor: pointer; 
        }

        /* Summary Area */
        .summary-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .summary-text { font-size: 0.9rem; color: #4a5568; font-weight: 600; }
        .total-amount { font-size: 1.3rem; font-weight: 800; color: #1a202c; }

        /* Professional Submit Button with Mini Font Design */
        .btn-submit {
            width: 100%;
            background: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(0, 135, 68, 0.3);
            transition: all 0.3s ease;
        }

        .btn-submit:hover { background: var(--secondary-color); transform: translateY(-1px); }

        /* Smooth Tik-Tik Blinking Keyframe */
        @keyframes tiktik {
            0% { opacity: 0.1; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>

<div class="phone-container">
    
    <div class="hero-banner">
        
        <div class="live-ticker">
            <div class="live-label-container">
                <div class="live-badge">
                    <div class="ticker-dot"></div> LIVE
                </div>
                <span class="draw-title">Today's Draw:</span>
            </div>
            <div class="ticker-text" id="live-draw-number">KL248918</div>
        </div>

    </div>

    <div class="status-bar">
        <span class="status-left-green">● Kerala State Lottery</span>
        <span class="status-right-green">● Live Ticket Online</span>
    </div>

    <form class="form-body" id="lotteryForm" onsubmit="sendToWhatsApp(event)">
        
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <div class="input-wrapper">
                <span class="icon">👤</span>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
        </div>

        <div class="form-group">
            <label for="mobileNumber">WhatsApp Number</label>
            <div class="input-wrapper">
                <span class="icon">📞</span>
                <input type="tel" id="mobileNumber" placeholder="Enter mobile number" pattern="[0-9]{10}" title="Please enter 10 digit number" required>
            </div>
        </div>

        <div class="ticket-container">
            <div class="ticket-header">
                <div class="ticket-title">🎟️ Choose Live Ticket</div>
            </div>
            
            <div class="ticket-grid" id="ticketGrid">
                </div>
        </div>

        <div class="summary-box">
            <div class="summary-text">Selected: <span id="selectedCount">0</span> Ticket(s)</div>
            <div class="total-amount">Amount: ₹<span id="totalPrice">0</span></div>
        </div>

        <button type="submit" class="btn-submit">
            📲 Submit & Continue To WhatsApp
        </button>
    </form>
</div>

<script>
    const TICKET_PRICE = 40;
    const WHATSAPP_NUMBER = "919709981588";

    const exactUserTickets = [
        "KL248918", "KL074252", "KL949345", "KL716637", "KL332233", "KL912802",
        "KL675249", "KL817262", "KL479530", "KL944274", "KL618322", "KL454126",
        "KL627837", "KL161202", "KL526324", "KL614273", "KL267082", "KL222211",
        "KL779849", "KL534444", "KL733394", "KL519242", "KL830991", "KL932334",
        "KL357599", "KL866248", "KL539300", "KL561230", "KL253652", "KL762521",
        "KL405610", "KL510248", "KL032315", "KL499441", "KL010365", "KL882991",
        "KL146704", "KL379249", "KL855732", "KL799438", "KL097325", "KL282904",
        "KL042330", "KL851045", "KL370131", "KL096330", "KL444582", "KL872625",
        "KL975221", "KL573448", "KL847739", "KL974362", "KL226698", "KL772989",
        "KL882847", "KL702524", "KL261028", "KL828529", "KL374445", "KL268432",
        "KL815314", "KL710348", "KL313326", "KL774267", "KL234837", "KL201359",
        "KL014237", "KL205362", "KL304249", "KL173379", "KL932381", "KL930420",
        "KL986270", "KL415254", "KL872348", "KL278289", "KL619404", "KL951528",
        "KL541200", "KL949295", "KL528281", "KL174546", "KL697242", "KL336358",
        "KL694320", "KL951546", "KL058416", "KL951538", "KL605340", "KL256303",
        "KL673220", "KL065265", "KL097279", "KL501462", "KL529963", "KL544630",
        "KL000332", "KL243434", "KL115528", "KL469924", "KL659026", "KL221421",
        "KL786923", "KL792622", "KL542621", "KL662541", "KL082741", "KL812546",
        "KL863360", "KL843120", "KL554420", "KL063445", "KL353549", "KL782656",
        "KL465321", "KL454521", "KL716341", "KL700207", "KL169336", "KL462322",
        "KL055406", "KL526320", "KL725241", "KL071234", "KL816328", "KL122054",
        "KL276281", "KL971447", "KL239449", "KL441204", "KL464444", "KL845295",
        "KL010410", "KL064555", "KL789625", "KL324441", "KL871020"
    ];

    const ticketGrid = document.getElementById('ticketGrid');
    
    exactUserTickets.forEach(ticketStr => {
        const item = document.createElement('div');
        item.className = 'ticket-item';
        item.setAttribute('onclick', `toggleTicket(this, '${ticketStr}')`);

        item.innerHTML = `
            <span class="ticket-number">★ ${ticketStr}</span>
            <input type="checkbox" class="ticket-checkbox" value="${ticketStr}" onclick="event.stopPropagation(); updateCalculation();">
        `;
        ticketGrid.appendChild(item);
    });

    function toggleTicket(element, ticketNum) {
        const checkbox = element.querySelector('.ticket-checkbox');
        checkbox.checked = !checkbox.checked;
        element.classList.toggle('selected', checkbox.checked);
        updateCalculation();
    }

    function updateCalculation() {
        const checkboxes = document.querySelectorAll('.ticket-checkbox:checked');
        document.getElementById('selectedCount').innerText = checkboxes.length;
        document.getElementById('totalPrice').innerText = checkboxes.length * TICKET_PRICE;
    }

    const liveDrawContainer = document.getElementById('live-draw-number');
    setInterval(() => {
        const randomTicket = exactUserTickets[Math.floor(Math.random() * exactUserTickets.length)];
        liveDrawContainer.innerText = randomTicket;
    }, 3000);

    function sendToWhatsApp(event) {
        event.preventDefault();
        const name = document.getElementById('fullName').value;
        const mobile = document.getElementById('mobileNumber').value;
        
        let selectedTickets = [];
        const activeCheckboxes = document.querySelectorAll('.ticket-checkbox:checked');
        activeCheckboxes.forEach(cb => selectedTickets.push(cb.value));

        if (selectedTickets.length === 0) {
            alert("Kripya kam se kam ek ticket select karein!");
            return;
        }

        const message = `*NEW KERALA LOTTERY BOOKING*\n\n` +
                        `👤 *Name:* ${name}\n` +
                        `📞 *WhatsApp:* ${mobile}\n\n` +
                        `🎟️ *Selected Tickets (${selectedTickets.length}):*\n${selectedTickets.join(', ')}\n\n` +
                        `💰 *Amount:* ₹${selectedTickets.length * TICKET_PRICE}\n\n` +
                        `*Status:* Pending Payment Confirmation`;

        window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`;
    }
</script>
</body>
</html>
